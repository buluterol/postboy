<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postboy - Lightweight API Testing Tool</title>
    <link rel="stylesheet" href="assets/css/output.css">
    <style>
        /* Additional inline styles for layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }
        
        .sidebar {
            grid-column: 1;
            grid-row: 2;
            overflow-y: auto;
        }
        
        .main-content {
            grid-column: 2;
            grid-row: 2;
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }
        
        .request-panel, .response-panel {
            overflow-y: auto;
        }
        
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr 1fr;
            }
            
            .sidebar {
                grid-column: 1;
                grid-row: 2;
                max-height: 300px;
            }
            
            .main-content {
                grid-column: 1;
                grid-row: 3 / 5;
            }
        }
    </style>
</head>
<body class="h-full">
    <div class="app-container">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between" style="grid-column: 1 / -1; grid-row: 1;">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold text-primary-600 dark:text-primary-400">Postboy</h1>
                <span class="text-sm text-gray-500 dark:text-gray-400">Lightweight API Testing</span>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- Environment Selector -->
                <div id="environmentSelector" class="hidden md:block">
                    <select id="activeEnvironment" class="select text-sm">
                        <option value="">No Environment</option>
                    </select>
                </div>
                
                <!-- Environment Manager Button -->
                <button id="manageEnvironmentsBtn" class="btn btn-secondary btn-sm" title="Manage Environments">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </button>
                
                <!-- History Button -->
                <button id="historyBtn" class="btn btn-secondary btn-sm" title="Request History">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </button>
                
                <!-- Theme Toggle -->
                <button id="themeToggle" class="btn btn-secondary btn-sm" title="Toggle Theme">
                    <svg id="themeIconLight" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <svg id="themeIconDark" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </header>
        
        <!-- Sidebar - Collections -->
        <aside class="sidebar bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 scrollbar-thin">
            <div class="p-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold">Collections</h2>
                    <button id="newCollectionBtn" class="btn btn-primary btn-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                    </button>
                </div>
                
                <div id="collectionsTree">
                    <!-- Collections will be rendered here -->
                    <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                        <p class="text-sm">No collections yet</p>
                        <p class="text-xs mt-1">Create your first collection</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content bg-gray-50 dark:bg-gray-900">
            <!-- Request Panel -->
            <div class="request-panel panel">
                <div class="panel-header flex items-center justify-between">
                    <span>Request</span>
                    <button id="saveRequestBtn" class="btn btn-primary btn-sm">
                        Save to Collection
                    </button>
                </div>
                <div class="panel-body">
                    <div id="requestBuilder">
                        <!-- Request builder will be rendered here -->
                    </div>
                </div>
            </div>
            
            <!-- Response Panel -->
            <div class="response-panel panel">
                <div class="panel-header">Response</div>
                <div class="panel-body">
                    <div id="responseViewer">
                        <!-- Response viewer will be rendered here -->
                        <div class="text-center text-gray-500 dark:text-gray-400 py-16">
                            <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <p>Send a request to see the response</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modals Container -->
    <div id="modals"></div>
    
    <!-- Toast Container -->
    <div id="toastContainer"></div>
    
    <!-- Scripts -->
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
